default:
  environment:
    STREAMX_BLUEPRINTS_KEY_VALUE_STATE_REPOSITORY_BACKEND: rocksdb
    STREAMX_BLUEPRINTS_KEY_VALUE_STATE_REPOSITORY_ROCKSDB_PATH: /var/lib/rocksdb

descriptors:
  relay:
    type: processing
    containers:
      service:
        incoming:
          events: {}
        outgoing:
          relayed-events: {}

  json-aggregator:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/json-aggregator:3.0.14-native
        incoming:
          data: {}
          multivalued-data: {}
        outgoing:
          aggregated-data: {}
          aggregated-multivalued-data: {}
        autoRef:
          - from: data
            to: data-state
            using: sync-state
          - from: multivalued-data
            to: multivalued-data-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  rendering-engine:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/rendering-engine:3.0.14-native
        incoming:
          data: {}
          renderers: {}
          rendering-contexts: {}
        outgoing:
          pages: {}
          fragments: {}
        autoRef:
          - from: outgoing-rendering-requests
            to: incoming-rendering-requests
            using: internal-relay
          - from: data
            to: data-state
            using: sync-state
          - from: renderers
            to: renderers-state
            using: sync-state
          - from: rendering-contexts
            to: rendering-contexts-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  composition-engine:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/composition-engine:3.0.14-native
        incoming:
          layouts: {}
          compositions: {}
        outgoing:
          pages: {}
        autoRef:
          - from: outgoing-page-compose-requests
            to: incoming-page-compose-requests
            using: internal-relay
          - from: layouts
            to: layouts-state
            using: sync-state
          - from: compositions
            to: compositions-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  data-collector:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/data-collector:3.0.14-native
        incoming:
          data: {}
        outgoing:
          collected-data: {}
          web-resources: {}
        autoRef:
          - from: data
            to: data-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  sitemap-generator:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/sitemap-generator:3.0.14-native
        incoming:
          incoming-pages: {}
        outgoing:
          outgoing-sitemaps: {}
        autoRef:
          - from: incoming-pages
            to: incoming-pages-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  web-server-sink:
    type: edge
    volumes:
      repository-volume:
        size: 10Gi
        persistent: true
    containers:
      sink:
        image: ghcr.io/streamx-com/streamx-blueprints/web-server-sink:3.0.14-native
        incoming:
          resources:
            initState: delta
        servicePorts:
          - 8083:8080
        volumes:
          - repository-volume:/srv/www
        environment:
          STREAMX_BLUEPRINTS_WEB_SERVER_SINK_STORAGE_ROOT_DIRECTORY: /srv/www
      webserver:
        image: docker.io/library/nginx:1.26.0
        servicePorts:
          - 8084:80
        volumes:
          - repository-volume:/usr/share/nginx/html

networking:
  httpRoutes:
    ingestion-route:
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: ingestion/rest-ingestion
              port: 8080
    web-server-route:
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: edge/web-server-sink
              port: 8084
sources:
  github:
    outgoing:
      - ref: inbox.pages
        produces:
          - com.streamx.blueprints.page.published.v1
          - com.streamx.blueprints.page.unpublished.v1
      - ref: inbox.fragments
        produces:
          - com.streamx.blueprints.fragment.published.v1
          - com.streamx.blueprints.fragment.unpublished.v1
      - ref: inbox.assets
        produces:
          - com.streamx.blueprints.asset.published.v1
          - com.streamx.blueprints.asset.unpublished.v1
      - ref: inbox.web-resources
        produces:
          - com.streamx.blueprints.web-resource.published.v1
          - com.streamx.blueprints.web-resource.unpublished.v1
      - ref: inbox.data
        produces:
          - com.streamx.blueprints.data.published.v1
          - com.streamx.blueprints.data.unpublished.v1
      - ref: inbox.renderers
        produces:
          - com.streamx.blueprints.renderer.published.v1
          - com.streamx.blueprints.renderer.unpublished.v1
      - ref: inbox.rendering-contexts
        produces:
          - com.streamx.blueprints.rendering-context.published.v1
          - com.streamx.blueprints.rendering-context.unpublished.v1
      - ref: inbox.layouts
        produces:
          - com.streamx.blueprints.layout.published.v1
          - com.streamx.blueprints.layout.unpublished.v1
      - ref: inbox.compositions
        produces:
          - com.streamx.blueprints.composition.published.v1
          - com.streamx.blueprints.composition.unpublished.v1
  pim:
    outgoing:
      - ref: inbox.data
        produces:
          - com.streamx.blueprints.data.published.v1
          - com.streamx.blueprints.data.unpublished.v1
  cms:
    outgoing:
      - ref: inbox.pages
        produces:
          - com.streamx.blueprints.page.published.v1
          - com.streamx.blueprints.page.unpublished.v1
      - ref: inbox.fragments
        produces:
          - com.streamx.blueprints.fragment.published.v1
          - com.streamx.blueprints.fragment.unpublished.v1
      - ref: inbox.assets
        produces:
          - com.streamx.blueprints.asset.published.v1
          - com.streamx.blueprints.asset.unpublished.v1
      - ref: inbox.web-resources
        produces:
          - com.streamx.blueprints.web-resource.published.v1
          - com.streamx.blueprints.web-resource.unpublished.v1
      - ref: inbox.data
        produces:
          - com.streamx.blueprints.data.published.v1
          - com.streamx.blueprints.data.unpublished.v1
      - ref: inbox.renderers
        produces:
          - com.streamx.blueprints.renderer.published.v1
          - com.streamx.blueprints.renderer.unpublished.v1
      - ref: inbox.rendering-contexts
        produces:
          - com.streamx.blueprints.rendering-context.published.v1
          - com.streamx.blueprints.rendering-context.unpublished.v1
      - ref: inbox.layouts
        produces:
          - com.streamx.blueprints.layout.published.v1
          - com.streamx.blueprints.layout.unpublished.v1
      - ref: inbox.compositions
        produces:
          - com.streamx.blueprints.composition.published.v1
          - com.streamx.blueprints.composition.unpublished.v1

ingestion:
  rest-ingestion:
    containers:
      proxy:
        environment:
          # Ensures that generated tokens would work between cluster restarts
          STREAMX_SOURCES_GITHUB_ACCEPT_IAT_FROM: "1704067200"
          STREAMX_SOURCES_PIM_ACCEPT_IAT_FROM: "1704067200"
          STREAMX_SOURCES_CMS_ACCEPT_IAT_FROM: "1704067200"

processing:
  incoming-pages-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.pages
        outgoing:
          relayed-events:
            ref: relay.pages
  pages-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: relay.pages
        outgoing:
          relayed-events:
            ref: outbox.pages

  web-resources-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.web-resources
        outgoing:
          relayed-events:
            ref: outbox.web-resources

  assets-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.assets
        outgoing:
          relayed-events:
            ref: outbox.assets

  fragments-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.fragments
        outgoing:
          relayed-events:
            ref: outbox.fragments

  json-aggregator:
    descriptor: json-aggregator
    containers:
      processor:
        incoming:
          data:
            ref: inbox.data
          multivalued-data:
            ref: inbox.data
        outgoing:
          aggregated-data:
            ref: relay.aggregated-data
          aggregated-multivalued-data:
            ref: inbox.data
        environmentFrom:
          configs:
            - json-aggregator.properties

  rendering-engine:
    descriptor: rendering-engine
    containers:
      processor:
        incoming:
          data:
            ref: relay.aggregated-data,relay.collected-data
          renderers:
            ref: inbox.renderers
          rendering-contexts:
            ref: inbox.rendering-contexts
        outgoing:
          pages:
            ref: relay.pages
          fragments:
            ref: outbox.fragments

  composition-engine:
    descriptor: composition-engine
    containers:
      processor:
        incoming:
          layouts:
            ref: inbox.layouts
          compositions:
            ref: inbox.compositions
        outgoing:
          pages:
            ref: inbox.pages

  data-collector:
    descriptor: data-collector
    containers:
      processor:
        incoming:
          data:
            ref: relay.aggregated-data,inbox.data
        outgoing:
          collected-data:
            ref: relay.collected-data
          web-resources:
            ref: outbox.web-resources
        environmentFrom:
          configs:
            - data-collector.properties

  sitemap-generator:
    descriptor: sitemap-generator
    containers:
      processor:
        incoming:
          incoming-pages:
            ref: relay.pages
        outgoing:
          outgoing-sitemaps:
            ref: outbox.web-resources
        environmentFrom:
          configs:
            - sitemap-generator.properties


edge:
  web-server-sink:
    descriptor: web-server-sink
    containers:
      sink:
        incoming:
          resources:
            ref: outbox.pages,outbox.fragments,outbox.assets,outbox.web-resources
        environmentFrom:
          configs:
            - web-server-sink.properties

      webserver:
        volumesFrom:
          configs:
            - nginx_conf/nginx.conf:/etc/nginx/conf.d/default.conf